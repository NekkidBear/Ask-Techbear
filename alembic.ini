# alembic.ini
# Ask TechBear — Alembic migration configuration
# Gymnarctos Studios LLC

[alembic]
# Path to migration scripts
script_location = alembic

# Template for revision file names
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length of slug in filename
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

# Database URL — overridden by env.py which reads from .env
# This value is a fallback only; do not commit real credentials here
sqlalchemy.url = postgresql://localhost/ask_techbear


[post_write_hooks]
# No post-write hooks configured


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S